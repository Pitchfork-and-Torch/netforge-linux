# NetForge Linux defaults — sourced by network-auto.sh
APP_NAME="NetForge"
DNS_SERVERS="1.1.1.1 1.0.0.1 8.8.8.8"
DNS_OVER_TLS="yes"
ETHERNET_METRIC=100
WIFI_METRIC_ALONE=600
WIFI_METRIC_WITH_ETH=700
LOCK_SECONDS=90
MAX_LOG_LINES=2000
DISABLE_SSHD=true
DISABLE_FILE_SHARE=true
DISABLE_LLMNR=true
DISABLE_MDNS=false
HIGH_PERFORMANCE_POWER=true
INSTALL_DIR="/opt/netforge"